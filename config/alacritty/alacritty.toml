general.import = [
  "~/.config/alacritty/catppuccin-macchiato.toml"
]

[font]
size = 11.0

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.offset]
x = -1
y = -1

[keyboard]
bindings = [
  { chars = "\u001B[27;5;9~", key = "Tab", mods = "Control" },
  { chars = "\u001B[27;6;9~", key = "Tab", mods = "Control|Shift" },
  { chars = "\u001B[70;5u", key = "F", mods = "Control|Shift" },
  { chars = "\u001B[80;5u", key = "P", mods = "Control|Shift" },
  { chars = "\u001B[82;5u", key = "R", mods = "Control|Shift" },
]

[window]
decorations = "full"
opacity = 0.9

[window.padding]
x = 18
y = 18
